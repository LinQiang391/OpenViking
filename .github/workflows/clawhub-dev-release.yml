name: ClawHub dev release (OpenViking plugin)

# Publishes examples/openclaw-plugin to ClawHub via GitHub Actions OIDC
# trusted publishing.
#
# This workflow MUST stay a thin wrapper that invokes the ClawHub-official
# reusable workflow (openclaw/clawhub/.github/workflows/package-publish.yml).
# ClawHub's mint endpoint only accepts OIDC tokens whose `job_workflow_ref`
# claim matches that exact reusable workflow path; any custom workflow that
# tries to mint a token directly fails with:
#   "Only the official ClawHub reusable workflow is supported for trusted publishing"
#
# Trigger:
#
#   Actions tab > "ClawHub dev release (OpenViking plugin)" > Run workflow
#   > pick this branch > set version 2026.4.35-dev.5, tags dev.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 2026.4.35-dev.5). Must match examples/openclaw-plugin/package.json."
        required: true
        default: "2026.4.35-dev.5"
      tags:
        description: "Comma-separated ClawHub tags. NEVER set to 'latest' for dev releases."
        required: false
        default: "dev"
      changelog:
        description: "Changelog text published with this release. (Currently informational only — package-publish reusable does not surface it.)"
        required: false
        default: "Dev preview release via OIDC trusted publishing."

permissions: {}

jobs:
  guard:
    name: Reject 'latest' tag (safety guard)
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Reject 'latest' tag
        if: ${{ contains(inputs.tags, 'latest') }}
        run: |
          echo "::error title=Refusing to publish::Tag 'latest' is not allowed from this dev workflow."
          exit 1

      - name: Show inputs
        run: |
          echo "version=${{ inputs.version }}"
          echo "tags=${{ inputs.tags }}"
          echo "changelog=${{ inputs.changelog }}"

  publish:
    name: Publish to ClawHub (OIDC)
    needs: guard
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      source: ${{ github.repository }}
      ref: ${{ github.sha }}
      dry_run: false
      json: true
      version: ${{ inputs.version }}
      tags: ${{ inputs.tags }}
      source_repo: ${{ github.repository }}
      source_commit: ${{ github.sha }}
      # source_ref deliberately omitted: package-publish reusable workflow
      # falls back to GITHUB_REF (e.g. refs/heads/publish), which matches
      # the OIDC token `ref` claim that ClawHub's resolveTrustedPublishSource
      # validates. Passing the short ref name (e.g. "publish") trips
      # "Trusted publish source ref must match the verified GitHub ref".
      source_path: examples/openclaw-plugin
