name: ClawHub dev release (OpenViking plugin)

# Publishes examples/openclaw-plugin to ClawHub via GitHub Actions OIDC
# trusted publishing. Required because the @openclaw scope is gated by
# publishers/publisherMembers on the server side and the package owner
# token cannot publish manually anymore (Forbidden for "@openclaw"). The
# trusted publisher config has been registered on ClawHub against this
# workflow filename and this repository, so OIDC publishes go through
# the github-actions branch in publishPackageImpl, which skips the
# publisherMembers check.
#
# After running, verify with:
#   clawhub package inspect "@openclaw/openviking"
# and confirm the `latest` tag is unchanged.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (e.g. 2026.4.35-dev.5). Must match examples/openclaw-plugin/package.json."
        required: true
        default: "2026.4.35-dev.5"
      tags:
        description: "Comma-separated ClawHub tags. NEVER set to 'latest' for dev releases."
        required: false
        default: "dev"
      changelog:
        description: "Changelog text published with this release."
        required: false
        default: "Dev preview release via OIDC trusted publishing."

permissions: {}

jobs:
  publish:
    name: Publish to ClawHub (OIDC)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Reject 'latest' tag (safety guard)
        if: ${{ contains(inputs.tags, 'latest') }}
        run: |
          echo "::error title=Refusing to publish::Tag 'latest' is not allowed from this dev workflow."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Show CLI version
        run: clawhub -V

      - name: Verify package.json version matches input
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./examples/openclaw-plugin/package.json').version")"
          echo "package.json version: $pkg_version"
          echo "input version:        $INPUT_VERSION"
          if [ "$pkg_version" != "$INPUT_VERSION" ]; then
            echo "::error::examples/openclaw-plugin/package.json version ($pkg_version) does not match input.version ($INPUT_VERSION). Bump the file or fix the input."
            exit 1
          fi

      - name: Build clean publish directory
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          src="examples/openclaw-plugin"
          dst="${RUNNER_TEMP}/ov-publish-clean"
          rm -rf "$dst"
          mkdir -p "$dst/commands"

          # Core .ts files (excluding vitest.config.ts).
          for f in "$src"/*.ts; do
            [ "$(basename "$f")" = "vitest.config.ts" ] && continue
            cp "$f" "$dst/"
          done

          # Configs and docs that the previous dev=2026.4.35-dev.4 release
          # already shipped (kept consistent for downstream tooling).
          for f in package.json openclaw.plugin.json install-manifest.json \
                   tsconfig.json package-lock.json .gitignore .clawhubignore \
                   README.md DISCUSSION-ov-import.md \
                   openclaw-multi-tenant-test-report.md; do
            if [ -f "$src/$f" ]; then cp "$src/$f" "$dst/"; fi
          done

          # commands/setup.ts is required for the openclaw setup CLI flow.
          if [ -f "$src/commands/setup.ts" ]; then
            cp "$src/commands/setup.ts" "$dst/commands/setup.ts"
          fi

          echo "Staged files:"
          find "$dst" -type f -printf "  %P\n" | sort
          echo "stage_dir=$dst" >> "$GITHUB_OUTPUT"

      - name: Verify OIDC env is injected
        shell: bash
        run: |
          set -u
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::OIDC env is missing. permissions.id-token: write is required."
            exit 1
          fi
          echo "OIDC env present: ACTIONS_ID_TOKEN_REQUEST_URL host=$(echo "$ACTIONS_ID_TOKEN_REQUEST_URL" | awk -F/ '{print $3}')"

      - name: Mint short-lived ClawHub publishToken from GitHub OIDC
        id: mint
        shell: bash
        env:
          PACKAGE_NAME: "@openclaw/openviking"
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # 1) Ask GitHub for an OIDC ID token with audience=clawhub
          oidc_url="${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=clawhub"
          oidc_response="$(curl --fail --silent --show-error \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            -H "Accept: application/json" \
            "$oidc_url")"
          gh_oidc_token="$(echo "$oidc_response" | jq -r .value)"
          if [ -z "$gh_oidc_token" ] || [ "$gh_oidc_token" = "null" ]; then
            echo "::error::Failed to retrieve GitHub OIDC token"
            exit 1
          fi
          echo "GitHub OIDC token retrieved (length=${#gh_oidc_token})"

          # 2) Exchange it at ClawHub for a short-lived publishToken
          mint_body="$(jq -n --arg n "$PACKAGE_NAME" --arg v "$PACKAGE_VERSION" --arg t "$gh_oidc_token" '{packageName:$n,version:$v,githubOidcToken:$t}')"
          # Capture body to file and HTTP status to stdout in a single curl call.
          tmp_body="$(mktemp)"
          http_status="$(curl --silent --show-error \
            -o "$tmp_body" \
            -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -X POST \
            -d "$mint_body" \
            "https://clawhub.ai/api/v1/publish/token/mint")"
          mint_response="$(cat "$tmp_body")"
          rm -f "$tmp_body"

          echo "::group::mint response (status=$http_status)"
          echo "$mint_response" | head -c 1500
          echo
          echo "::endgroup::"

          if [ "$http_status" != "200" ]; then
            echo "::error::ClawHub mint API returned HTTP $http_status. Body: $mint_response"
            exit 1
          fi

          publish_token="$(echo "$mint_response" | jq -r '.token // empty')"
          if [ -z "$publish_token" ]; then
            echo "::error::Mint response 200 but no .token field. Body: $mint_response"
            exit 1
          fi

          # 3) Mask and export
          echo "::add-mask::$publish_token"
          echo "publish_token=$publish_token" >> "$GITHUB_OUTPUT"

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ steps.mint.outputs.publish_token }}
        run: |
          clawhub package publish "${{ steps.stage.outputs.stage_dir }}" \
            --family code-plugin \
            --name "@openclaw/openviking" \
            --version "${{ inputs.version }}" \
            --tags "${{ inputs.tags }}" \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --source-ref "${{ github.ref_name }}" \
            --source-path "examples/openclaw-plugin" \
            --changelog "${{ inputs.changelog }}"

      - name: Inspect resulting tag layout
        if: ${{ always() }}
        run: clawhub package inspect "@openclaw/openviking" || true
